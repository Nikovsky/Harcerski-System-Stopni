name: Zgloszenie bledu (PL)
description: Zglos blad w HSS
title: "[BUG][PL] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Zgloszenie bledu (PL)
        Dzieki za zgloszenie.

        > [!IMPORTANT]
        > Jesli zgloszenie dotyczy podatnosci bezpieczenstwa, **nie** tworz publicznego issue.
        > Uzyj procesu opisanego w `SECURITY.md`:
        > https://github.com/Nikovsky/Harcerski-System-Stopni/blob/main/SECURITY.md

  - type: textarea
    id: summary
    attributes:
      label: Krotki opis bledu
      description: Jednoznacznie opisz, co nie dziala.
      placeholder: "Np. Formularz zapisuje dane, ale zwraca 500 przy submit."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Kroki reprodukcji
      description: Podaj precyzyjne kroki.
      placeholder: |
        1. Otworz ...
        2. Kliknij ...
        3. Wpisz ...
        4. Zatwierdz ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Oczekiwane zachowanie
      placeholder: "Np. System powinien zapisac rekord i pokazac komunikat sukcesu."
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Aktualne zachowanie
      placeholder: "Np. Zwrot 500 i brak zapisu."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Obszar
      description: Gdzie wystepuje problem?
      options:
        - apps/web
        - apps/api
        - packages/schemas
        - packages/database
        - docker/infra
        - docs
        - nie wiem
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Srodowisko
      description: "Format: Browser/OS, rola usera, wersja/branch/commit"
      placeholder: "Chrome 122 / Windows 11, COMMISSION_MEMBER, main@abc1234"
    validations:
      required: false

  - type: dropdown
    id: impact
    attributes:
      label: Wplyw
      options:
        - Critical (blokuje krytyczny flow)
        - High (duza funkcja nie dziala)
        - Medium (jest obejscie)
        - Low (problem kosmetyczny)
    validations:
      required: true

  - type: textarea
    id: logs_and_screenshots
    attributes:
      label: Logi / screenshoty / requestId
      description: Wklej logi i requestId. Usun sekrety, tokeny, hasla i PII.
      placeholder: "Tutaj wklej logi lub dolacz obrazy."
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Potwierdzenia
      options:
        - label: Potwierdzam, ze to nie jest publiczne zgloszenie podatnosci security.
          required: true
        - label: Potwierdzam, ze usunalem(-am) sekrety i dane wrazliwe z tresci zgloszenia.
          required: true
        - label: Sprawdzilem(-am), ze nie ma duplikatu tego bledu.
          required: true
    validations:
      required: true
