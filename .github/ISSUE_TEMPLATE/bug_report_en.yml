name: Bug report (EN)
description: Report a bug in HSS
title: "[BUG][EN] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug report (EN)
        Thanks for reporting an issue.

        > [!IMPORTANT]
        > If this is a security vulnerability, do **not** create a public issue.
        > Follow `SECURITY.en.md`:
        > https://github.com/Nikovsky/Harcerski-System-Stopni/blob/main/SECURITY.en.md

  - type: textarea
    id: summary
    attributes:
      label: Short summary
      description: Describe what is broken.
      placeholder: "Example: Form submit returns 500 although input is valid."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. Fill ...
        4. Submit ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      placeholder: "What should happen?"
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      placeholder: "What actually happens?"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - apps/web
        - apps/api
        - packages/schemas
        - packages/database
        - docker/infra
        - docs
        - unknown
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "Format: Browser/OS, user role, version/branch/commit"
      placeholder: "Chrome 122 / Windows 11, COMMISSION_MEMBER, main@abc1234"
    validations:
      required: false

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Critical (blocks critical flow)
        - High (major feature broken)
        - Medium (workaround exists)
        - Low (cosmetic/minor)
    validations:
      required: true

  - type: textarea
    id: logs_and_screenshots
    attributes:
      label: Logs / screenshots / requestId
      description: Remove secrets, tokens, passwords, and PII before posting.
      placeholder: "Paste logs or attach screenshots."
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I confirm this is not a public security vulnerability disclosure.
          required: true
        - label: I removed secrets and sensitive data from this report.
          required: true
        - label: I checked for duplicate issues.
          required: true
    validations:
      required: true
