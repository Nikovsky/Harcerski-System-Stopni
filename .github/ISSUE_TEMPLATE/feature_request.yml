name: Propozycja funkcji (PL)
description: Zglos propozycje nowej funkcji dla HSS
title: "[FEATURE][PL] "
labels: ["feature", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Propozycja funkcji (PL)
        Opisz problem i wartosc funkcji. Im bardziej konkretnie, tym szybciej da sie to zaplanowac.

  - type: textarea
    id: problem
    attributes:
      label: Problem do rozwiazania
      description: Co dzisiaj nie dziala lub jest nieefektywne?
      placeholder: "Opisz aktualny problem i jego skutki."
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proponowane rozwiazanie
      description: Jak to powinno dzialac z perspektywy usera/systemu?
      placeholder: "Opisz preferowane rozwiazanie."
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: User story (opcjonalnie)
      description: "Format: Jako [persona], chce [akcja], aby [korzysc]."
      placeholder: "Jako ..., chce ..., aby ..."
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Kryteria akceptacji
      placeholder: |
        - [ ] Kryterium 1
        - [ ] Kryterium 2
        - [ ] Kryterium 3
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Glowny obszar
      options:
        - apps/web
        - apps/api
        - packages/schemas
        - packages/database
        - docker/infra
        - docs
        - cross-cutting
    validations:
      required: true

  - type: textarea
    id: technical_notes
    attributes:
      label: Notatki techniczne
      description: Endpointy, schematy, migracje, integracje, ograniczenia.
      placeholder: |
        - API:
        - Schematy:
        - DB/migracje:
        - Inne:
    validations:
      required: false

  - type: dropdown
    id: security_impact
    attributes:
      label: Wplyw na bezpieczenstwo
      options:
        - Brak
        - Dotyczy auth/session/cookies
        - Dotyczy RBAC/permissions
        - Dotyczy PII / dane wrazliwe
        - Dotyczy upload/S3/MinIO
        - Dotyczy infra hardening
    validations:
      required: true

  - type: dropdown
    id: scaling_impact
    attributes:
      label: Wplyw na skalowanie
      options:
        - Bez wplywu (stateless)
        - Wymaga stanu zewnetrznego (DB/Redis)
        - Ryzyko SINGLE-INSTANCE (wymaga uzasadnienia)
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Sprawdzilem(-am), ze podobna propozycja nie istnieje.
          required: true
        - label: Opisalem(-am) mierzalne kryteria akceptacji.
          required: true
        - label: Uwzglednilem(-am) wplyw na security i skalowanie.
          required: true
